<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Assignment 0</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    canvas {
      background: black;
      border: 1px solid #333;
      display: block;
      margin-bottom: 20px;
    }
    .row {
      margin-bottom: 10px;
    }
    input, select, button {
      margin-right: 8px;
      padding: 4px 8px;
    }
  </style>
</head>
<body onload="main()">
  <h1>Assignment 0: Vector Library</h1>

  <canvas id="example" width="400" height="400"></canvas>

  <div class="row">
    <label>v1:</label>
    <input type="number" id="v1x" value="2.25" step="any">
    <input type="number" id="v1y" value="2.25" step="any">
  </div>

  <div class="row">
    <label>v2:</label>
    <input type="number" id="v2x" value="1" step="any">
    <input type="number" id="v2y" value="1" step="any">
  </div>

  <div class="row">
    <button onclick="handleDrawEvent()">Draw</button>
  </div>

  <div class="row">
    <select id="operation">
      <option value="add">Add</option>
      <option value="sub">Subtract</option>
      <option value="mul">Multiply</option>
      <option value="div">Divide</option>
      <option value="magnitude">Magnitude</option>
      <option value="normalize">Normalize</option>
      <option value="angle">Angle between</option>
      <option value="area">Area</option>
    </select>

    <input type="number" id="scalar" value="2" step="any">
    <button onclick="handleDrawOperationEvent()">Draw Operation</button>
  </div>

  <script src="../lib/cuon-matrix-cse160.js"></script>
  <script src="asg0.js"></script>
</body>
</html>
